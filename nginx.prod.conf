server {
    listen 80;

    server_name _;

    root /usr/share/nginx/html;

    index index.html;
    location = / {
        rewrite ^ /react/ permanent;
    }

    location /react/assets/ {
        alias /usr/share/nginx/html/react/assets/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /react/ {
        alias /usr/share/nginx/html/react/;
        try_files $uri $uri/ /react/index.html;
    }
}